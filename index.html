<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #2c3e50;
            color: white;
            border-bottom: 3px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

         aside {
            position: absolute;
            top: 70px;
            left: 0;
            width: 200px;
            height: 100vh;
            background: #3498db;
            border-right: 3px solid black;
            padding: 20px;
            z-index: 5;
        }
        
    </style>
    <title>Document</title>
</head>
<body>
     <header>
        <h2>Meu Site Criativo</h2>
    </header>

    <aside>
        <ul>
            <li>Inicio</li>
            <li>Projetos</li>
            <li>Jogos</li>
            <li>Contato</li>
        </ul>
    </aside>
    
</body>
</html>
